<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Voxel Realm</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #87b9e8;
      }
      #app {
        width: 100vw;
        height: 100vh;
        display: block;
      }
      #overlay {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font: 16px system-ui, sans-serif;
        color: #fff;
        background: rgba(0, 0, 0, 0.35);
        text-align: center;
        cursor: pointer;
      }
      #crosshair {
        position: fixed;
        left: 50%;
        top: 50%;
        width: 6px;
        height: 6px;
        margin: -3px 0 0 -3px;
        background: #fff;
        border-radius: 50%;
        opacity: 0.8;
        pointer-events: none;
      }
      #creative-ui {
        position: fixed;
        inset: 12px 12px auto 12px;
        z-index: 5;
        display: grid;
        gap: 8px;
        font: 13px system-ui, sans-serif;
        color: #fff;
        pointer-events: none;
      }
      #creative-ui button,
      #creative-ui select {
        pointer-events: auto;
        border: 1px solid rgba(255, 255, 255, 0.26);
        border-radius: 6px;
        background: rgba(18, 24, 30, 0.76);
        color: #fff;
        padding: 6px 8px;
        font: inherit;
        cursor: pointer;
      }
      #creative-ui button:hover,
      #creative-ui select:hover {
        background: rgba(42, 72, 88, 0.86);
      }
      .creative-top,
      .creative-hotbar,
      .creative-picker {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }
      .creative-hotbar {
        position: fixed;
        left: 50%;
        bottom: 18px;
        max-width: 92vw;
        justify-content: center;
        transform: translateX(-50%);
      }
      .creative-hotbar button {
        min-width: 78px;
      }
      .creative-hotbar button.selected {
        outline: 2px solid #fff;
        background: rgba(78, 116, 148, 0.88);
      }
      .creative-picker {
        max-width: 520px;
      }
      .creative-status {
        width: max-content;
        max-width: 70vw;
        padding: 6px 8px;
        border-radius: 6px;
        background: rgba(18, 24, 30, 0.76);
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.7);
      }
    </style>
  </head>
  <body>
    <canvas id="app"></canvas>
    <div id="crosshair"></div>
    <div id="overlay">
      Click to play — WASD move, mouse look, Space/Shift up·down, F toggle fly · LMB use tool,
      RMB place, MMB pick · 1-9 hotbar slot, E picker, T cycle tool (box tools: click two
      corners) · Ctrl+Z undo, Ctrl+Y redo · press Esc to use the menus
    </div>
    <script type="module" src="/src/app/main.ts"></script>
  </body>
</html>
