<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Voxel Realm</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #87b9e8;
      }
      #app {
        width: 100vw;
        height: 100vh;
        display: block;
      }
      #overlay {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font:
          16px system-ui,
          sans-serif;
        color: #fff;
        background: rgba(0, 0, 0, 0.35);
        text-align: center;
        cursor: pointer;
      }
      #crosshair {
        position: fixed;
        left: 50%;
        top: 50%;
        width: 6px;
        height: 6px;
        margin: -3px 0 0 -3px;
        background: #fff;
        border-radius: 50%;
        opacity: 0.8;
        pointer-events: none;
      }
      #creative-ui {
        position: fixed;
        inset: 0;
        z-index: 5;
        font:
          13px system-ui,
          sans-serif;
        color: #eef2f6;
        pointer-events: none;
      }
      #creative-ui button {
        pointer-events: auto;
        font: inherit;
        cursor: pointer;
      }

      /* ---- Tool dock (top-left) ---- */
      .creative-dock {
        position: fixed;
        top: 12px;
        left: 12px;
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 10px;
        max-width: calc(100vw - 24px);
      }
      .creative-tools {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        padding: 8px;
        border-radius: 14px;
        background: rgba(18, 22, 28, 0.82);
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.07);
      }
      .tool-btn {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 6px 10px;
        border: 1px solid transparent;
        border-radius: 9px;
        background: transparent;
        color: rgba(238, 242, 246, 0.62);
        transition:
          color 120ms ease,
          background-color 140ms ease,
          box-shadow 160ms ease;
      }
      .tool-btn svg {
        flex: none;
        display: block;
      }
      .tool-btn:hover {
        color: #eef2f6;
        background: rgba(255, 255, 255, 0.06);
      }
      .tool-btn.active {
        color: #fff;
        background: rgba(255, 211, 77, 0.16);
        box-shadow: inset 0 0 0 1px rgba(255, 211, 77, 0.55);
      }
      .reset-btn {
        padding: 7px 12px;
        border: 1px solid rgba(255, 255, 255, 0.28);
        border-radius: 10px;
        background: rgba(18, 22, 28, 0.6);
        color: #eef2f6;
        transition:
          background-color 140ms ease,
          border-color 140ms ease;
      }
      .reset-btn:hover {
        background: rgba(150, 70, 58, 0.28);
        border-color: rgba(255, 255, 255, 0.4);
      }

      /* ---- Status toast (centered, above hotbar) ---- */
      .creative-status {
        position: fixed;
        left: 50%;
        bottom: 92px;
        transform: translateX(-50%);
        max-width: 70vw;
        width: max-content;
        padding: 7px 14px;
        border-radius: 999px;
        background: rgba(12, 15, 20, 0.85);
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: #eef2f6;
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.7);
        opacity: 0;
        transition: opacity 200ms ease;
        pointer-events: none;
      }
      .creative-status.is-visible {
        opacity: 1;
      }

      /* ---- Hotbar (bottom-center hero) ---- */
      .creative-hotbar {
        position: fixed;
        left: 50%;
        bottom: 16px;
        transform: translateX(-50%);
        display: flex;
        gap: 8px;
        max-width: 96vw;
        padding: 8px;
        border-radius: 14px;
        background: rgba(18, 22, 28, 0.82);
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.07);
      }
      .creative-hotbar .slot {
        position: relative;
        width: 52px;
        height: 52px;
        padding: 0;
        border: 1px solid rgba(255, 255, 255, 0.22);
        border-radius: 10px;
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.18),
          inset 0 -6px 10px rgba(0, 0, 0, 0.22);
        transition:
          transform 120ms ease,
          box-shadow 160ms ease,
          border-color 140ms ease;
      }
      .creative-hotbar .slot:hover {
        transform: translateY(-2px);
        border-color: rgba(255, 255, 255, 0.35);
      }
      .creative-hotbar .slot.selected {
        transform: translateY(-3px);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.18),
          inset 0 -6px 10px rgba(0, 0, 0, 0.22),
          0 0 0 2px #ffd34d,
          0 0 14px 2px rgba(255, 211, 77, 0.45);
      }
      .slot-badge {
        position: absolute;
        top: 3px;
        left: 3px;
        padding: 0 4px;
        border-radius: 5px;
        background: rgba(0, 0, 0, 0.35);
        color: #eef2f6;
        font-family: ui-monospace, 'Courier New', monospace;
        font-size: 11px;
        line-height: 16px;
        text-shadow: 0 1px 2px #000;
      }

      /* ---- Inventory modal (E to toggle): scrim + centered "Blocks" panel ---- */
      .inventory-scrim {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        background: rgba(0, 0, 0, 0.45);
        pointer-events: none;
        opacity: 0;
        visibility: hidden;
        transition:
          opacity 150ms ease,
          visibility 0s linear 150ms;
      }
      .inventory-scrim.is-open {
        pointer-events: auto;
        opacity: 1;
        visibility: visible;
        transition:
          opacity 150ms ease,
          visibility 0s;
      }
      .inventory-panel {
        width: 100%;
        max-width: 440px;
        padding: 16px;
        border-radius: 12px;
        background: rgba(18, 22, 28, 0.92);
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow:
          0 10px 30px rgba(0, 0, 0, 0.5),
          inset 0 1px 0 rgba(255, 255, 255, 0.06);
        opacity: 0;
        transform: scale(0.96);
        transition:
          opacity 180ms cubic-bezier(0.2, 0.8, 0.2, 1),
          transform 180ms cubic-bezier(0.2, 0.8, 0.2, 1);
      }
      .inventory-scrim.is-open .inventory-panel {
        opacity: 1;
        transform: scale(1);
      }
      .inventory-title {
        margin-bottom: 12px;
        font-size: 15px;
        font-weight: 500;
        color: #eef2f6;
      }
      .inventory-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 10px;
      }
      .inventory-tile {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
        padding: 0;
        border: none;
        background: transparent;
        color: inherit;
      }
      .inventory-swatch {
        display: block;
        width: 100%;
        aspect-ratio: 1;
        border: 1px solid rgba(255, 255, 255, 0.22);
        border-radius: 10px;
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.18),
          inset 0 -6px 10px rgba(0, 0, 0, 0.22);
        transition:
          transform 120ms ease,
          border-color 140ms ease;
      }
      .inventory-name {
        max-width: 100%;
        overflow: hidden;
        font-size: 11px;
        color: rgba(238, 242, 246, 0.7);
        text-align: center;
        white-space: nowrap;
        text-overflow: ellipsis;
      }
      .inventory-tile:hover .inventory-swatch {
        transform: translateY(-2px);
        border-color: rgba(255, 255, 255, 0.4);
      }

      @media (prefers-reduced-motion: reduce) {
        .tool-btn,
        .reset-btn,
        .creative-hotbar .slot {
          transition: none;
        }
        .creative-hotbar .slot:hover,
        .creative-hotbar .slot.selected {
          transform: none;
        }
        .inventory-panel {
          transition: opacity 180ms ease;
          transform: none;
        }
        .inventory-scrim.is-open .inventory-panel {
          transform: none;
        }
        .inventory-swatch {
          transition: border-color 140ms ease;
        }
        .inventory-tile:hover .inventory-swatch {
          transform: none;
        }
      }
    </style>
  </head>
  <body>
    <canvas id="app"></canvas>
    <div id="crosshair"></div>
    <div id="overlay">
      Click to play — WASD move, mouse look, Space/Shift up·down, F toggle fly · LMB use tool, RMB
      place, MMB pick · 1-9 hotbar slot, E inventory, T cycle tool (box tools: click two corners) ·
      L headlamp · Ctrl+Z undo, Ctrl+Y redo · press Esc to use the menus
    </div>
    <script type="module" src="/src/app/main.ts"></script>
  </body>
</html>
